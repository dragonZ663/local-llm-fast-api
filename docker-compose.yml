version: "3.9"

services:
  api:
    build: .
    container_name: local-llm-fastapi-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: local-llm-nginx
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
